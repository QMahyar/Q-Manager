name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Get or Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.get-release.outputs.id || steps.create-release.outputs.id }}
      upload_url: ${{ steps.get-release.outputs.upload_url || steps.create-release.outputs.upload_url }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Get version from tag
        id: tag_name
        run: echo "current_version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Get existing release
        id: get-release
        run: |
          response=$(curl -s -w "\n%{http_code}" -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${GITHUB_REF#refs/tags/}")
          status=$(echo "$response" | tail -n 1)
          body=$(echo "$response" | sed '$d')
          if [ "$status" = "200" ] && [ -n "$body" ] && echo "$body" | jq -e .id >/dev/null; then
            id=$(echo "$body" | jq -r .id)
            upload_url=$(echo "$body" | jq -r .upload_url)
            echo "id=$id" >> $GITHUB_OUTPUT
            echo "upload_url=$upload_url" >> $GITHUB_OUTPUT
          fi
      
      - name: Create Release
        id: create-release
        if: steps.get-release.outputs.id == ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-tauri:
    name: Build Tauri App (${{ matrix.platform }})
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.platform }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Telethon dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install telethon pyinstaller cryptg python-socks
      
      - name: Build Telethon worker (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          cd telethon-worker
          powershell -ExecutionPolicy Bypass -File build-telethon.ps1 -Output dist -Clean
      
      - name: Build Telethon worker (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          cd telethon-worker
          chmod +x build-telethon.sh
          ./build-telethon.sh --output dist --clean

      - name: Verify Telethon worker build (Linux / macOS)
        if: runner.os != 'Windows'
        run: ls -lh telethon-worker/dist/
      
      - name: Verify Telethon worker build (Windows)
        if: matrix.platform == 'windows-latest'
        run: dir telethon-worker\dist\
      
      - name: Install frontend dependencies
        run: npm ci
      
      - name: Configure bundle resources (Windows)
        if: matrix.platform == 'windows-latest'
        shell: powershell
        run: |
          $configPath = "src-tauri/tauri.conf.json"
          $config = Get-Content $configPath | ConvertFrom-Json
          $config.bundle.resources = @("../telethon-worker/dist/telethon-worker.exe")
          $config | ConvertTo-Json -Depth 20 | Set-Content $configPath

      - name: Configure bundle resources (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          config_path = Path('src-tauri/tauri.conf.json')
          config = json.loads(config_path.read_text())
          config["bundle"]["resources"] = ["../telethon-worker/dist/telethon-worker"]
          config_path.write_text(json.dumps(config, indent=2))
          PY

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.platform == 'ubuntu-latest' && '--verbose' || '' }}
      
      - name: Create portable package (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          $version = $env:GITHUB_REF -replace 'refs/tags/v', ''
          $portableDir = "Q-Manager-$version-portable-win-x64"
          $zipName = "$portableDir.zip"
          
          # Create portable directory
          New-Item -ItemType Directory -Force -Path $portableDir
          
          # Copy executable and dependencies
          $exePath = Get-ChildItem -Path src-tauri/target/release -Filter q-manager.exe -Recurse | Select-Object -First 1
          if (-not $exePath) { throw "q-manager.exe not found in src-tauri/target/release" }
          Copy-Item $exePath.FullName $portableDir/
          Copy-Item telethon-worker/dist/telethon-worker.exe $portableDir/
          
          # Create portable ZIP
          Compress-Archive -Path $portableDir -DestinationPath $zipName -Force
          
          Write-Host "Created portable package: $zipName"
          Get-Item $zipName | Select-Object Name, Length
      
      - name: Upload portable package (Windows)
        if: matrix.platform == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = $env:GITHUB_REF -replace 'refs/tags/v', ''
          $zipName = "Q-Manager-$version-portable-win-x64.zip"
          
          # Upload using gh CLI
          gh release upload $env:GITHUB_REF_NAME $zipName --clobber
      
      - name: Upload build artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.platform }}
          path: |
            src-tauri/target/release/build/*/output
            src-tauri/target/release/*.log
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Headless "browser app" server binaries.
  # A single self-contained binary (webview-free, so it builds for ARM/Termux):
  # run it, then open the printed http://localhost link in any browser, on any
  # device on your LAN. Built with --no-default-features --features server.
  # ---------------------------------------------------------------------------
  build-server:
    name: Build Server Binary (${{ matrix.name }})
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
          - name: linux-aarch64
            os: ubuntu-24.04-arm
          - name: windows-x86_64
            os: windows-latest
          # Cross-compiled on the abundant Apple Silicon runner (scarce/retiring
          # macos-13 Intel runners caused long queue times). The worker is built
          # universal2 so it runs on x86_64 too.
          - name: macos-x86_64
            os: macos-latest
            rust_target: x86_64-apple-darwin
            worker_arch: universal2
          - name: macos-aarch64
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: server-${{ matrix.name }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            server-${{ matrix.name }}-cargo-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Note: no GTK/WebKit system deps — the server build has no webview.
      - name: Build Telethon worker (Windows)
        if: runner.os == 'Windows'
        run: |
          cd telethon-worker
          powershell -ExecutionPolicy Bypass -File build-telethon.ps1 -Output dist -Clean

      - name: Build Telethon worker (Linux / macOS)
        if: runner.os != 'Windows'
        env:
          PYINSTALLER_TARGET_ARCH: ${{ matrix.worker_arch }}
        run: |
          cd telethon-worker
          chmod +x build-telethon.sh
          ./build-telethon.sh --output dist --clean

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend (embedded into the server binary)
        run: npm run build

      - name: Build server binary
        shell: bash
        run: |
          target="${{ matrix.rust_target }}"
          if [ -n "$target" ]; then
            rustup target add "$target"
            cargo build --release --locked --no-default-features --features server \
              --manifest-path src-tauri/Cargo.toml --target "$target"
            echo "SERVER_BIN=src-tauri/target/$target/release/q-manager" >> "$GITHUB_ENV"
          else
            cargo build --release --locked --no-default-features --features server \
              --manifest-path src-tauri/Cargo.toml
            echo "SERVER_BIN=src-tauri/target/release/q-manager" >> "$GITHUB_ENV"
          fi

      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          version="${GITHUB_REF#refs/tags/v}"
          pkg="q-manager-${version}-server-${{ matrix.name }}"
          mkdir -p "$pkg"
          cp "${SERVER_BIN:-src-tauri/target/release/q-manager}" "$pkg/q-manager"
          cp telethon-worker/dist/telethon-worker "$pkg/telethon-worker"
          chmod +x "$pkg/q-manager" "$pkg/telethon-worker"
          cat > "$pkg/README.txt" <<EOF
          Q Manager — headless (browser) edition.
          Run:   ./q-manager serve
          Then open the printed http://localhost:8787 link in your browser.
          For other devices on your network, use the Network URL it prints.
          Keep q-manager and telethon-worker in the same folder.
          EOF
          tar -czf "${pkg}.tar.gz" "$pkg"
          gh release upload "${GITHUB_REF_NAME}" "${pkg}.tar.gz" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF -replace 'refs/tags/v', ''
          $pkg = "q-manager-$version-server-${{ matrix.name }}"
          New-Item -ItemType Directory -Force -Path $pkg | Out-Null
          Copy-Item src-tauri/target/release/q-manager.exe "$pkg/q-manager.exe"
          Copy-Item telethon-worker/dist/telethon-worker.exe "$pkg/telethon-worker.exe"
          @"
          Q Manager - headless (browser) edition.
          Run:   q-manager.exe serve
          Then open the printed http://localhost:8787 link in your browser.
          For other devices on your network, use the Network URL it prints.
          Keep q-manager.exe and telethon-worker.exe in the same folder.
          "@ | Set-Content "$pkg/README.txt"
          Compress-Archive -Path $pkg -DestinationPath "$pkg.zip" -Force
          gh release upload $env:GITHUB_REF_NAME "$pkg.zip" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

